<!doctype html>
<html lang="no">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>RocketRaider — Lektor Tronrud</title>
<link rel="icon" type="image/png" href="../assets/logo.png" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; padding: 0; background: #020817; min-height: 100vh; height: 100%; overflow: hidden; }
  body { font-family: 'Exo 2', sans-serif; color: #fff; }

  /* The game internally is 800×540 fixed. Scale it to fit the viewport, letterboxed. */
  #root {
    width: 100vw;
    height: 100vh;
    display: grid;
    place-items: center;
  }
  /* Game's root div has these dimensions; constrain max via a transform on the wrapper. */
  #scale-wrap {
    width: 800px;
    height: 100vh;
    max-height: 100vh;
    position: relative;
  }
  /* On small screens (tablets, phones), let it scale. */
  @media (max-width: 820px) {
    #scale-wrap { transform-origin: center center; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="rocketraider.jsx"></script>

</body>
</html>
